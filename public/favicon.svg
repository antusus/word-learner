<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#7DE2D1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Large speech bubble -->
  <path d="M80 140
           h352
           a80 80 0 0 1 80 80
           v60
           a80 80 0 0 1 -80 80
           h-140
           l-60 52
           v-52
           h-152
           a80 80 0 0 1 -80 -80
           v-60
           a80 80 0 0 1 80 -80
           z"
        fill="#FFFFFF"/>

  <!-- Globe (slightly bigger) -->
  <circle cx="256" cy="245" r="64" fill="none" stroke="#5B8CFF" stroke-width="3"/>
  <ellipse cx="256" cy="245" rx="38" ry="64" fill="none" stroke="#5B8CFF" stroke-width="3"/>
  <ellipse cx="256" cy="245" rx="64" ry="24" fill="none" stroke="#5B8CFF" stroke-width="3"/>

  <!-- Bigger, thinner smile -->
  <path d="M210 270 q46 36 92 0"
        stroke="#5B8CFF"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

</svg>
