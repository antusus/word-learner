<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#7DE2D1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Top text -->
  <text x="256" y="110" text-anchor="middle"
        font-size="48"
        font-family="Arial, sans-serif"
        fill="#FFFFFF"
        font-weight="bold">
    WORLD
  </text>

  <!-- Speech bubble -->
  <path d="M140 160
           h232
           a60 60 0 0 1 60 60
           v40
           a60 60 0 0 1 -60 60
           h-90
           l-42 36
           v-36
           h-100
           a60 60 0 0 1 -60 -60
           v-40
           a60 60 0 0 1 60 -60
           z"
        fill="#FFFFFF"/>

  <!-- Globe grid -->
  <circle cx="256" cy="230" r="48" fill="none" stroke="#5B8CFF" stroke-width="3"/>
  <ellipse cx="256" cy="230" rx="28" ry="48" fill="none" stroke="#5B8CFF" stroke-width="3"/>
  <ellipse cx="256" cy="230" rx="48" ry="18" fill="none" stroke="#5B8CFF" stroke-width="3"/>

  <!-- Smile -->
  <path d="M228 245 q28 20 56 0"
        stroke="#5B8CFF"
        stroke-width="4"
        fill="none"
        stroke-linecap="round"/>

  <!-- Bottom text -->
  <text x="256" y="460" text-anchor="middle"
        font-size="42"
        font-family="Arial, sans-serif"
        fill="#FFFFFF"
        font-weight="bold">
    LEARNER
  </text>

</svg>
